<!DOCTYPE html>
<html>
<head>
    <title>Dungeon Crawler - Sunny Nimbre</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            padding: 20px;
        }
        .game-container {
            background: #0f0f23;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            border: 1px solid #ffd700;
            max-width: 800px;
            width: 100%;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
            padding: 15px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border-radius: 15px;
            color: #1a1a2e;
        }
        .header h1 { font-size: 24px; letter-spacing: 3px; }
        .header p { font-size: 12px; margin-top: 5px; }
        .stats {
            background: #1a1a3e;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            border: 1px solid #ffd700;
        }
        .stat-card {
            background: #0f0f2a;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-label { color: #ffd700; font-size: 11px; }
        .stat-value { color: #00ff88; font-size: 20px; font-weight: bold; }
        .battle-area {
            background: #0a0a1a;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #ff4444;
            min-height: 200px;
        }
        .enemy {
            text-align: center;
            margin-bottom: 20px;
        }
        .enemy-name {
            font-size: 24px;
            color: #ff4444;
            font-weight: bold;
        }
        .enemy-hp-bar {
            background: #330000;
            height: 20px;
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }
        .enemy-hp-fill {
            background: #ff4444;
            height: 100%;
            width: 100%;
            transition: width 0.3s;
        }
        .player-hp-bar {
            background: #003300;
            height: 20px;
            border-radius: 10px;
            overflow: hidden;
            margin: 5px 0;
        }
        .player-hp-fill {
            background: #00ff88;
            height: 100%;
            width: 100%;
            transition: width 0.3s;
        }
        .combat-log {
            background: #000000aa;
            border-radius: 10px;
            padding: 10px;
            height: 80px;
            overflow-y: auto;
            font-size: 12px;
            color: #00ff88;
            margin-top: 15px;
        }
        .actions {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        button {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-family: monospace;
            font-size: 14px;
            transition: transform 0.2s;
        }
        button:active { transform: scale(0.95); }
        button:disabled {
            opacity: 0.5;
            transform: none;
        }
        .donate {
            text-align: center;
            margin-top: 15px;
            padding: 12px;
            background: #1a1a3e;
            border-radius: 10px;
            font-size: 12px;
            border: 1px solid #ffd700;
        }
        .donate a {
            color: #ffd700;
            text-decoration: none;
        }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .shake { animation: shake 0.3s; }
    </style>
</head>
<body>
<div class="game-container">
    <div class="header">
        <h1>⚔️ DUNGEON CRAWLER ⚔️</h1>
        <p>Created by SUNNY NIMBRE</p>
    </div>

    <div class="stats">
        <div class="stat-card"><div class="stat-label">❤️ HP</div><div class="stat-value" id="hp">100</div></div>
        <div class="stat-card"><div class="stat-label">⚔️ ATK</div><div class="stat-value" id="atk">20</div></div>
        <div class="stat-card"><div class="stat-label">🛡️ DEF</div><div class="stat-value" id="def">10</div></div>
        <div class="stat-card"><div class="stat-label">💰 GOLD</div><div class="stat-value" id="gold">100</div></div>
    </div>

    <div class="battle-area">
        <div class="enemy">
            <div class="enemy-name" id="enemyName">🐺 Goblin</div>
            <div class="enemy-hp-bar"><div class="enemy-hp-fill" id="enemyHpFill" style="width:100%"></div></div>
            <div class="player-hp-bar"><div class="player-hp-fill" id="playerHpFill" style="width:100%"></div></div>
        </div>
        <div class="combat-log" id="combatLog">
            > Game started!<br>
            > Fight the dungeon...
        </div>
    </div>

    <div class="actions">
        <button id="attackBtn">⚔️ ATTACK</button>
        <button id="healBtn">🩹 HEAL</button>
        <button id="potionBtn">🧪 POTION</button>
        <button id="resetBtn">🔄 RESET</button>
    </div>

    <div class="donate">
        ❤️ SUPPORT CREATOR ❤️<br>
        📱 UPI: <strong>sunnynimbre3@oksbi</strong> |
        🌐 PayPal: <strong>paypal.me/@mrlegend4591</strong><br>
        🙏 Send any amount - ₹10/₹50/₹100
    </div>
</div>

<script>
    // Game State
    let player = {
        hp: 100, maxHp: 100,
        atk: 20, def: 10,
        gold: 100,
        potions: 3
    };
    
    let enemy = {
        name: "🐺 Goblin",
        hp: 60, maxHp: 60,
        atk: 12
    };
    
    let floor = 1;
    
    // Get elements
    const hpEl = document.getElementById('hp');
    const atkEl = document.getElementById('atk');
    const defEl = document.getElementById('def');
    const goldEl = document.getElementById('gold');
    const enemyNameEl = document.getElementById('enemyName');
    const enemyHpFill = document.getElementById('enemyHpFill');
    const playerHpFill = document.getElementById('playerHpFill');
    const combatLog = document.getElementById('combatLog');
    
    function updateUI() {
        hpEl.textContent = Math.max(0, player.hp);
        atkEl.textContent = player.atk;
        defEl.textContent = player.def;
        goldEl.textContent = player.gold;
        enemyNameEl.textContent = enemy.name;
        
        const enemyPercent = (enemy.hp / enemy.maxHp) * 100;
        enemyHpFill.style.width = Math.max(0, enemyPercent) + '%';
        
        const playerPercent = (player.hp / player.maxHp) * 100;
        playerHpFill.style.width = Math.max(0, playerPercent) + '%';
    }
    
    function log(msg, isError = false) {
        const div = document.createElement('div');
        div.innerHTML = `> ${msg}`;
        div.style.color = isError ? '#ff8888' : '#00ff88';
        div.style.margin = '2px 0';
        combatLog.appendChild(div);
        combatLog.scrollTop = combatLog.scrollHeight;
        while(combatLog.children.length > 20) {
            combatLog.removeChild(combatLog.firstChild);
        }
    }
    
    function showDamage() {
        document.querySelector('.battle-area').classList.add('shake');
        setTimeout(() => document.querySelector('.battle-area').classList.remove('shake'), 300);
    }
    
    function checkGameOver() {
        if(player.hp <= 0) {
            log('💀 GAME OVER! Press RESET to play again!', true);
            document.getElementById('attackBtn').disabled = true;
            document.getElementById('healBtn').disabled = true;
            document.getElementById('potionBtn').disabled = true;
            return true;
        }
        return false;
    }
    
    function checkVictory() {
        if(enemy.hp <= 0) {
            const goldReward = 30 + floor * 5;
            player.gold += goldReward;
            log(`🎉 VICTORY! +${goldReward} gold! Moving to floor ${floor + 1}`, false);
            floor++;
            spawnEnemy();
            updateUI();
            
            // Auto heal after victory
            player.hp = Math.min(player.maxHp, player.hp + 15);
            updateUI();
            return true;
        }
        return false;
    }
    
    function spawnEnemy() {
        const enemies = [
            { name: "🐺 Goblin", hp: 50 + floor * 3, atk: 12 + Math.floor(floor/3), gold: 25 },
            { name: "🐉 Orc", hp: 70 + floor * 4, atk: 16 + Math.floor(floor/3), gold: 35 },
            { name: "👻 Skeleton", hp: 60 + floor * 3, atk: 15 + Math.floor(floor/3), gold: 30 },
            { name: "🧙 Dark Mage", hp: 55 + floor * 4, atk: 20 + Math.floor(floor/2), gold: 45 },
            { name: "🗡️ Dark Knight", hp: 90 + floor * 5, atk: 24 + Math.floor(floor/2), gold: 60 }
        ];
        
        const isBoss = floor % 5 === 0;
        if(isBoss) {
            const bossHp = 150 + floor * 8;
            const bossAtk = 35 + Math.floor(floor/2);
            enemy = {
                name: `👑 DRAGON LORD (Floor ${floor} BOSS)`,
                hp: bossHp, maxHp: bossHp,
                atk: bossAtk
            };
            log(`⚠️ BOSS ENCOUNTER! ${enemy.name} appears! ⚠️`, true);
        } else {
            const e = enemies[Math.min(Math.floor(floor/4), enemies.length-1)];
            const hpBonus = floor * 3;
            const atkBonus = Math.floor(floor/3);
            enemy = {
                name: e.name,
                hp: e.hp + hpBonus, maxHp: e.hp + hpBonus,
                atk: e.atk + atkBonus
            };
            log(`⚔️ Floor ${floor}: ${enemy.name} appears!`, false);
        }
        updateUI();
    }
    
    function attack() {
        if(player.hp <= 0) return;
        
        const playerDmg = Math.floor(Math.random() * 15) + player.atk - 5;
        enemy.hp -= playerDmg;
        log(`⚔️ You deal ${playerDmg} damage!`, false);
        updateUI();
        showDamage();
        
        if(checkVictory()) return;
        
        const enemyDmg = Math.max(1, Math.floor(Math.random() * 10) + enemy.atk - Math.floor(player.def/2));
        player.hp -= enemyDmg;
        log(`💔 ${enemy.name} deals ${enemyDmg} damage!`, true);
        updateUI();
        
        if(checkGameOver()) return;
        updateUI();
    }
    
    function heal() {
        if(player.hp <= 0) return;
        
        const healAmount = 25;
        player.hp = Math.min(player.maxHp, player.hp + healAmount);
        log(`🩹 You healed ${healAmount} HP!`, false);
        updateUI();
        
        const enemyDmg = Math.max(1, Math.floor(Math.random() * 10) + enemy.atk - Math.floor(player.def/2));
        player.hp -= enemyDmg;
        log(`💔 ${enemy.name} deals ${enemyDmg} damage!`, true);
        updateUI();
        
        checkGameOver();
    }
    
    function usePotion() {
        if(player.hp <= 0) return;
        
        if(player.potions > 0 && player.gold >= 30) {
            player.potions--;
            player.gold -= 30;
            const healAmount = 50;
            player.hp = Math.min(player.maxHp, player.hp + healAmount);
            log(`🧪 Used Health Potion! +${healAmount} HP (-30 gold)`, false);
            updateUI();
        } else if(player.gold < 30) {
            log(`❌ Need 30 gold for potion!`, true);
            return;
        } else {
            log(`❌ No potions left!`, true);
            return;
        }
        
        const enemyDmg = Math.max(1, Math.floor(Math.random() * 10) + enemy.atk - Math.floor(player.def/2));
        player.hp -= enemyDmg;
        log(`💔 ${enemy.name} deals ${enemyDmg} damage!`, true);
        updateUI();
        
        checkGameOver();
    }
    
    function resetGame() {
        player = {
            hp: 100, maxHp: 100,
            atk: 20, def: 10,
            gold: 100,
            potions: 3
        };
        floor = 1;
        combatLog.innerHTML = '> Game restarted!<br>> Fight the dungeon...';
        document.getElementById('attackBtn').disabled = false;
        document.getElementById('healBtn').disabled = false;
        document.getElementById('potionBtn').disabled = false;
        spawnEnemy();
        updateUI();
        log('✨ Game reset! Good luck!', false);
    }
    
    // Event listeners
    document.getElementById('attackBtn').addEventListener('click', attack);
    document.getElementById('healBtn').addEventListener('click', heal);
    document.getElementById('potionBtn').addEventListener('click', usePotion);
    document.getElementById('resetBtn').addEventListener('click', resetGame);
    
    // Start game
    spawnEnemy();
    updateUI();
</script>
</body>
</html>
